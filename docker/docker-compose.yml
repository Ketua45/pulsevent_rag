name: rag_runtime

services:
  rag:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: pulsevent-rag-runtime:latest
    env_file:
      - ../.env
    environment:
      USER: rag
      LOGNAME: rag
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      TORCHINDUCTOR_CACHE_DIR: /tmp/torchinductor
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ../data:/app/data
      - ../vectorstore_normandie:/app/vectorstore_normandie
      - ../.cache/huggingface:/cache/huggingface
    stdin_open: true
    tty: true
    command: ["--help"]
